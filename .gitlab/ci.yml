# GitLab CI: on tag v*, build release archives and a Docker image, then upload archives to SSH storage.
#
# Platform list: scripts/release-platforms.txt — keep parallel.matrix below in sync (same GOOS/GOARCH rows).
#
# Trigger: tags matching v* (e.g. pull mirror with "Trigger pipelines for mirror updates").
#
# Implementation: scripts/release-build-all.sh (per matrix cell); .gitlab/ci-gitlab-release-upload.sh (upload only);
# scripts/prepare-docker-embed-dist.sh (stage embed templates with Dockerfile into */dist/);
# scripts/patch-docker-embed-image-refs.sh (patch dist/agent.toml image refs after image manifest merge);
# .gitlab/ci-picoclaw-image.sh (stage csgclaw-cli from dist/ into picoclaw manager/worker images); .gitlab/bookworm-mirror.sh (apt sources).
#
# Required CI/CD variables:
#   REMOTE_SSH – e.g. root@cdn.example.com
#   ACR_REGISTRY – registry hostname only (no scheme)
#   Toolchain mirrors: ${ACR_REGISTRY}/opencsg_public/ (golang, alpine, kaniko)
#   Product images: ${ACR_REGISTRY}/opencsghq/ (csgclaw, picoclaw-*, node, crane-ci)
#   ACR_USERNAME / ACR_PASSWORD – credentials with push access to ${ACR_REGISTRY}/opencsghq/csgclaw
#   and ${ACR_REGISTRY}/opencsghq/picoclaw-{manager,worker}
#
# Recommended:
#   SSH_PRIVATE_KEY – PEM text (Variable) OR GitLab “File” variable (value is a path in the job; script copies to ~/.ssh/id_rsa)
#   SSH_KNOWN_HOSTS – host keys for ssh (recommended)
#
# Optional:
#   SSH_PORT – default 22
#   REMOTE_BASE_DIR – default /data/csgclaw (releases under .../releases/<tag>/)
#   PICOCLAW_BASE_TAG – upstream picoclaw base image tag; default 2026.5.27
#   BOXLITE_CLI_VERSION – default v0.9.0
#   BOXLITE_CLI_BASE_URL – boxlite-cli tarballs; default mirrors https://csgclaw.opencsg.com/boxlite-cli/{version}/{filename} (matches fetch-boxlite-cli.sh)
#   BOXLITE_CURL_INSECURE – default 1 (TLS inspection); set 0 if csgclaw.opencsg.com is trusted as-is
#
# Debian apt: before install, rewrite official mirrors to Aliyun (faster in CN). Override DEBIAN_APT_MIRROR_* in CI vars if needed.
#
# Go modules: GOPROXY defaults below (mainland-friendly). Override in CI/CD Variables if needed.
#
# CI images: Alibaba Cloud ACR mirrors (Runner cannot use docker.io).
# Set ACR_REGISTRY in CI/CD Variables. Push mirrors once, e.g.:
#   docker login ${ACR_REGISTRY}
#   docker tag golang:bookworm ${ACR_REGISTRY}/opencsg_public/golang:bookworm
#   docker push ${ACR_REGISTRY}/opencsg_public/golang:bookworm
#   docker tag golang:1.26.2-alpine ${ACR_REGISTRY}/opencsg_public/golang:1.26.2-alpine
#   docker push ${ACR_REGISTRY}/opencsg_public/golang:1.26.2-alpine
#   docker tag alpine:3.23 ${ACR_REGISTRY}/opencsg_public/alpine:3.23
#   docker push ${ACR_REGISTRY}/opencsg_public/alpine:3.23
#   docker pull --platform linux/amd64 node:22.13.0-bookworm-slim
#   docker tag node:22.13.0-bookworm-slim ${ACR_REGISTRY}/opencsghq/node:22.13.0-bookworm-slim
#   docker push ${ACR_REGISTRY}/opencsghq/node:22.13.0-bookworm-slim
#   docker pull --platform linux/amd64 node:22.13.0-alpine
#   docker tag node:22.13.0-alpine ${ACR_REGISTRY}/opencsghq/node:22.13.0-alpine
#   docker push ${ACR_REGISTRY}/opencsghq/node:22.13.0-alpine
#   docker tag gcr.io/kaniko-project/executor:debug ${ACR_REGISTRY}/opencsg_public/kaniko-executor:debug
#   docker push ${ACR_REGISTRY}/opencsg_public/kaniko-executor:debug
#   # picoclaw manifest jobs require ${ACR_REGISTRY}/opencsghq/crane-ci:${CRANE_VERSION} (one-time manual push).

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  BOXLITE_CLI_VERSION: "v0.9.0"
  BOXLITE_CLI_BASE_URL: "https://csgclaw.opencsg.com/boxlite-cli"
  BOXLITE_CURL_INSECURE: "1"
  GOTOOLCHAIN: "auto"
  GOPROXY: "https://goproxy.cn,direct"
  DEBIAN_APT_MIRROR_DEB: "http://mirrors.aliyun.com/debian"
  DEBIAN_APT_MIRROR_SEC: "http://mirrors.aliyun.com/debian-security"
  PICOCLAW_BASE_TAG: "2026.5.27"
  CRANE_VERSION: "v0.20.6"

stages:
  - web
  - build
  - image
  - release
  - upload

.release_rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

.release_image:
  image:
    name: ${ACR_REGISTRY}/opencsg_public/golang:bookworm

.web_image:
  image:
    name: ${ACR_REGISTRY}/opencsghq/node:22.13.0-bookworm-slim

.kaniko_image:
  image:
    name: ${ACR_REGISTRY}/opencsg_public/kaniko-executor:debug
    entrypoint: [""]

.crane_image:
  image:
    name: ${ACR_REGISTRY}/opencsghq/crane-ci:${CRANE_VERSION}
    entrypoint: [""]

.kaniko_acr_auth:
  before_script:
    - test -n "${ACR_REGISTRY}"
    - test -n "${ACR_USERNAME}"
    - test -n "${ACR_PASSWORD}"
    - mkdir -p /kaniko/.docker
    - export ACR_AUTH="$(printf '%s:%s' "$ACR_USERNAME" "$ACR_PASSWORD" | base64 | tr -d '\n')"
    - printf '{"auths":{"%s":{"auth":"%s"}}}\n' "$ACR_REGISTRY" "$ACR_AUTH" > /kaniko/.docker/config.json

.picoclaw_image_build:
  extends:
    - .kaniko_image
    - .kaniko_acr_auth
    - .release_rules
  stage: image
  needs:
    - job: release-cli-build
      artifacts: true
  parallel:
    matrix:
      - GOARCH: amd64
      - GOARCH: arm64
  script:
    - chmod +x .gitlab/ci-picoclaw-image.sh
    - sh .gitlab/ci-picoclaw-image.sh "${GOARCH}" "${PICOCLAW_DOCKERFILE}" "${PICOCLAW_IMAGE_NAME}"

web-build:
  extends:
    - .web_image
    - .release_rules
  stage: web
  before_script:
    - npm install -g pnpm@11.1.3
    - node --version
    - pnpm --version
  script:
    - pnpm --dir web/app install --frozen-lockfile
    - mkdir -p web/static-dist
    - pnpm --dir web/app build
    - test -f web/static-dist/index.html
  artifacts:
    paths:
      - web/static-dist/
    expire_in: 1 day

embed-templates-prepare:
  extends:
    - .release_image
    - .release_rules
  stage: build
  script:
    - chmod +x scripts/prepare-docker-embed-dist.sh
    - scripts/prepare-docker-embed-dist.sh
  artifacts:
    paths:
      - internal/templates/embed/*/dist/
    expire_in: 1 day

# Linux csgclaw-cli only — consumed by docker embed image builds before the full release.
# Needs embed-templates-prepare: csgclaw-cli links internal/templates (go:embed embed/*/dist for Dockerfile templates).
release-cli-build:
  extends:
    - .release_image
    - .release_rules
  stage: build
  needs:
    - job: embed-templates-prepare
      artifacts: true
  parallel:
    matrix:
      - GOOS: linux
        GOARCH: amd64
      - GOOS: linux
        GOARCH: arm64
  before_script:
    - chmod +x .gitlab/bookworm-mirror.sh scripts/release-build-all.sh
    - bash .gitlab/bookworm-mirror.sh
    - apt-get update -qq && apt-get install -y --no-install-recommends zip ca-certificates
  script:
    - export VERSION="$CI_COMMIT_TAG"
    - export COMMIT="$(git rev-parse --short HEAD)"
    - export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - export DIST_DIR="${DIST_DIR:-dist}"
    - export RELEASE_APPS="csgclaw-cli"
    - mkdir -p "$DIST_DIR" "${CI_PROJECT_DIR}/.gocache"
    - export GOCACHE="${GOCACHE:-${CI_PROJECT_DIR}/.gocache}"
    - export BOXLITE_CLI_VERSION="${BOXLITE_CLI_VERSION:-v0.9.0}"
    - ./scripts/release-build-all.sh "$GOOS" "$GOARCH"
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

# Must match scripts/release-platforms.txt (order need not match; set must match).
release-build:
  extends:
    - .release_image
    - .release_rules
  stage: release
  needs:
    - job: web-build
      artifacts: true
    - job: embed-templates-patch
      artifacts: true
  parallel:
    matrix:
      - GOOS: linux
        GOARCH: amd64
      - GOOS: linux
        GOARCH: arm64
      - GOOS: darwin
        GOARCH: arm64
      - GOOS: darwin
        GOARCH: amd64
      - GOOS: windows
        GOARCH: amd64
  before_script:
    - chmod +x .gitlab/bookworm-mirror.sh scripts/release-build-all.sh
    - bash .gitlab/bookworm-mirror.sh
    - apt-get update -qq && apt-get install -y --no-install-recommends zip ca-certificates
  script:
    - export VERSION="$CI_COMMIT_TAG"
    - export COMMIT="$(git rev-parse --short HEAD)"
    - export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - export DIST_DIR="${DIST_DIR:-dist}"
    - mkdir -p "$DIST_DIR" "${CI_PROJECT_DIR}/.gocache"
    - export GOCACHE="${GOCACHE:-${CI_PROJECT_DIR}/.gocache}"
    - export BOXLITE_CLI_VERSION="${BOXLITE_CLI_VERSION:-v0.9.0}"
    - ./scripts/release-build-all.sh "$GOOS" "$GOARCH"
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

docker-build-amd64:
  extends:
    - .kaniko_image
    - .kaniko_acr_auth
    - .release_rules
  stage: release
  needs:
    - job: embed-templates-patch
      artifacts: true
  script:
    - export COMMIT="$(git rev-parse --short HEAD)"
    - export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --custom-platform linux/amd64 \
        --destination "${ACR_REGISTRY}/opencsghq/csgclaw:${CI_COMMIT_TAG}" \
        --build-arg GO_IMAGE="${ACR_REGISTRY}/opencsg_public/golang:1.26.2-alpine" \
        --build-arg NODE_IMAGE="${ACR_REGISTRY}/opencsghq/node:22.13.0-alpine" \
        --build-arg RUNTIME_IMAGE="${ACR_REGISTRY}/opencsg_public/alpine:3.23" \
        --build-arg GOPROXY="${GOPROXY}" \
        --build-arg VERSION="${CI_COMMIT_TAG}" \
        --build-arg COMMIT="${COMMIT}" \
        --build-arg BUILD_TIME="${BUILD_TIME}"

picoclaw-manager-image:
  extends: .picoclaw_image_build
  variables:
    PICOCLAW_DOCKERFILE: internal/templates/embed/picoclaw-manager/Dockerfile
    PICOCLAW_IMAGE_NAME: picoclaw-manager

picoclaw-worker-image:
  extends: .picoclaw_image_build
  variables:
    PICOCLAW_DOCKERFILE: internal/templates/embed/picoclaw-worker/Dockerfile
    PICOCLAW_IMAGE_NAME: picoclaw-worker

.picoclaw_manifest:
  extends:
    - .crane_image
    - .release_rules
  stage: image
  before_script:
    - chmod +x .gitlab/ci-picoclaw-manifest.sh
    - crane version
  script:
    - sh .gitlab/ci-picoclaw-manifest.sh "${PICOCLAW_IMAGE_NAME}"

picoclaw-manager-manifest:
  extends: .picoclaw_manifest
  needs:
    - job: picoclaw-manager-image
      artifacts: false
  variables:
    PICOCLAW_IMAGE_NAME: picoclaw-manager

picoclaw-worker-manifest:
  extends: .picoclaw_manifest
  needs:
    - job: picoclaw-worker-image
      artifacts: false
  variables:
    PICOCLAW_IMAGE_NAME: picoclaw-worker

embed-templates-patch:
  extends:
    - .release_image
    - .release_rules
  stage: release
  needs:
    - job: embed-templates-prepare
      artifacts: true
    - job: picoclaw-manager-manifest
      artifacts: false
    - job: picoclaw-worker-manifest
      artifacts: false
  script:
    - chmod +x scripts/patch-docker-embed-image-refs.sh
    - scripts/patch-docker-embed-image-refs.sh
  artifacts:
    paths:
      - internal/templates/embed/*/dist/
    expire_in: 1 day

release-upload:
  extends:
    - .release_image
    - .release_rules
  stage: upload
  needs:
    - job: release-build
      artifacts: true
    - job: docker-build-amd64
      artifacts: false
  before_script:
    - chmod +x .gitlab/bookworm-mirror.sh
    - bash .gitlab/bookworm-mirror.sh
    - apt-get update -qq && apt-get install -y --no-install-recommends openssh-client python3 ca-certificates
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - |
      if [ -z "${REMOTE_SSH}" ]; then
        echo "REMOTE_SSH must be set in CI/CD variables" >&2
        exit 1
      fi
    - |
      if [ -n "${SSH_PRIVATE_KEY}" ]; then
        if [ -f "${SSH_PRIVATE_KEY}" ]; then
          cp "${SSH_PRIVATE_KEY}" ~/.ssh/id_rsa
        else
          printf '%s\n' "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
        fi
        chmod 600 ~/.ssh/id_rsa
        export SSH_IDENTITY_FILE="${HOME}/.ssh/id_rsa"
      fi
    - |
      if [ -n "${SSH_KNOWN_HOSTS}" ]; then
        printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts
      else
        KEYSCAN_HOST="${REMOTE_SSH##*@}"
        if ! ssh-keyscan -p "${SSH_PORT:-22}" "${KEYSCAN_HOST}" >> ~/.ssh/known_hosts 2>/dev/null; then
          echo "ssh-keyscan failed; set SSH_KNOWN_HOSTS in CI variables" >&2
          exit 1
        fi
      fi
  script:
    - bash .gitlab/ci-gitlab-release-upload.sh
