# GitLab CI: release on tag v*; docker embed images on main branch commits.
#
# Platform list: scripts/release-platforms.txt — keep parallel.matrix below in sync (same GOOS/GOARCH rows).
#
# Triggers:
#   - tag v* — release archives, csgclaw Docker image, SSH upload (uses committed embed agent.toml)
#   - push / merge to default branch (main) — build/push embed images when embed agent.toml changed in the pushed range (uses committed version/ref; no bump)
#
# Implementation: scripts/release-build-all.sh (per matrix cell); .gitlab/ci-gitlab-release-upload.sh (upload only);
# .gitlab/ci-docker-embed-version-check.sh (gate builds on CI_COMMIT_BEFORE_SHA..HEAD; never bumps version);
# .gitlab/ci-docker-embed-image.sh (stage csgclaw-cli from dist/ into docker embed images); .gitlab/bookworm-mirror.sh (apt sources).
#
# Required CI/CD variables:
#   REMOTE_SSH – e.g. root@cdn.example.com
#   ACR_REGISTRY – registry hostname only (no scheme)
#   Toolchain mirrors: ${ACR_REGISTRY}/opencsg_public/ (golang, alpine, kaniko)
#   Product images: ${ACR_REGISTRY}/opencsghq/ (csgclaw, picoclaw-*, openclaw-*, node, crane-ci)
#   ACR_USERNAME / ACR_PASSWORD – credentials with push access to ${ACR_REGISTRY}/opencsghq/csgclaw
#   and ${ACR_REGISTRY}/opencsghq/{picoclaw,openclaw}-{manager,worker}
#
# Recommended:
#   SSH_PRIVATE_KEY – PEM text (Variable) OR GitLab “File” variable (value is a path in the job; script copies to ~/.ssh/id_rsa)
#   SSH_KNOWN_HOSTS – host keys for ssh (recommended)
#
# Optional:
#   SSH_PORT – default 22
#   REMOTE_BASE_DIR – default /data/csgclaw (releases under .../releases/<tag>/)
#   PICOCLAW_BASE_IMAGE – optional override for upstream picoclaw base (default: Dockerfile ARG)
#   OPENCLAW_BASE_IMAGE – optional override for upstream openclaw base (default: Dockerfile ARG)
#   BOXLITE_CLI_VERSION – default v0.9.0
#   BOXLITE_CLI_BASE_URL – boxlite-cli tarballs; default mirrors https://csgclaw.opencsg.com/boxlite-cli/{version}/{filename} (matches fetch-boxlite-cli.sh)
#   BOXLITE_CURL_INSECURE – default 1 (TLS inspection); set 0 if csgclaw.opencsg.com is trusted as-is
#
# Debian apt: before install, rewrite official mirrors to Aliyun (faster in CN). Override DEBIAN_APT_MIRROR_* in CI vars if needed.
#
# Go modules: GOPROXY defaults below (mainland-friendly). Override in CI/CD Variables if needed.
#
# CI images: Alibaba Cloud ACR mirrors (Runner cannot use docker.io).
# Set ACR_REGISTRY in CI/CD Variables. Push mirrors once, e.g.:
#   docker login ${ACR_REGISTRY}
#   docker tag golang:bookworm ${ACR_REGISTRY}/opencsg_public/golang:bookworm
#   docker push ${ACR_REGISTRY}/opencsg_public/golang:bookworm
#   docker tag golang:1.26.2-alpine ${ACR_REGISTRY}/opencsg_public/golang:1.26.2-alpine
#   docker push ${ACR_REGISTRY}/opencsg_public/golang:1.26.2-alpine
#   docker tag alpine:3.23 ${ACR_REGISTRY}/opencsg_public/alpine:3.23
#   docker push ${ACR_REGISTRY}/opencsg_public/alpine:3.23
#   docker pull --platform linux/amd64 node:22.13.0-bookworm-slim
#   docker tag node:22.13.0-bookworm-slim ${ACR_REGISTRY}/opencsghq/node:22.13.0-bookworm-slim
#   docker push ${ACR_REGISTRY}/opencsghq/node:22.13.0-bookworm-slim
#   docker pull --platform linux/amd64 node:22.13.0-alpine
#   docker tag node:22.13.0-alpine ${ACR_REGISTRY}/opencsghq/node:22.13.0-alpine
#   docker push ${ACR_REGISTRY}/opencsghq/node:22.13.0-alpine
#   docker tag gcr.io/kaniko-project/executor:debug ${ACR_REGISTRY}/opencsg_public/kaniko-executor:debug
#   docker push ${ACR_REGISTRY}/opencsg_public/kaniko-executor:debug
#   # picoclaw manifest jobs require ${ACR_REGISTRY}/opencsghq/crane-ci:${CRANE_VERSION} (one-time manual push).

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  BOXLITE_CLI_VERSION: "v0.9.0"
  BOXLITE_CLI_BASE_URL: "https://csgclaw.opencsg.com/boxlite-cli"
  BOXLITE_CURL_INSECURE: "1"
  GOTOOLCHAIN: "auto"
  GOPROXY: "https://goproxy.cn,direct"
  DEBIAN_APT_MIRROR_DEB: "http://mirrors.aliyun.com/debian"
  DEBIAN_APT_MIRROR_SEC: "http://mirrors.aliyun.com/debian-security"
  CRANE_VERSION: "v0.20.6"

stages:
  - web
  - build
  - image
  - release
  - upload

.release_rules:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

.main_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null

.release_image:
  image:
    name: ${ACR_REGISTRY}/opencsg_public/golang:bookworm

.web_image:
  image:
    name: ${ACR_REGISTRY}/opencsghq/node:22.13.0-bookworm-slim

.kaniko_image:
  image:
    name: ${ACR_REGISTRY}/opencsg_public/kaniko-executor:debug
    entrypoint: [""]

.crane_image:
  image:
    name: ${ACR_REGISTRY}/opencsghq/crane-ci:${CRANE_VERSION}
    entrypoint: [""]

.kaniko_acr_auth:
  before_script:
    - test -n "${ACR_REGISTRY}"
    - test -n "${ACR_USERNAME}"
    - test -n "${ACR_PASSWORD}"
    - mkdir -p /kaniko/.docker
    - export ACR_AUTH="$(printf '%s:%s' "$ACR_USERNAME" "$ACR_PASSWORD" | base64 | tr -d '\n')"
    - printf '{"auths":{"%s":{"auth":"%s"}}}\n' "$ACR_REGISTRY" "$ACR_AUTH" > /kaniko/.docker/config.json

.docker_embed_image_build:
  extends:
    - .kaniko_image
    - .kaniko_acr_auth
    - .main_rules
  stage: image
  needs:
    - job: docker-embed-version-check
      artifacts: true
    - job: docker-embed-cli-build
      artifacts: true
  parallel:
    matrix:
      - GOARCH: amd64
      - GOARCH: arm64
  script:
    - |
      case "${DOCKER_EMBED_IMAGE_NAME}" in
        picoclaw-manager) build_flag="${PICOCLAW_MANAGER_BUILD:-false}" ;;
        picoclaw-worker) build_flag="${PICOCLAW_WORKER_BUILD:-false}" ;;
        openclaw-manager) build_flag="${OPENCLAW_MANAGER_BUILD:-false}" ;;
        openclaw-worker) build_flag="${OPENCLAW_WORKER_BUILD:-false}" ;;
        *)
          echo "unknown docker embed image ${DOCKER_EMBED_IMAGE_NAME}" >&2
          exit 1
          ;;
      esac
      if [ "${build_flag}" != "true" ]; then
        echo "docker embed version unchanged; skipping ${DOCKER_EMBED_IMAGE_NAME} image build"
        exit 0
      fi
    - chmod +x .gitlab/ci-docker-embed-image.sh
    - sh .gitlab/ci-docker-embed-image.sh "${GOARCH}" "${DOCKER_EMBED_DOCKERFILE}" "${DOCKER_EMBED_IMAGE_NAME}"

web-build:
  extends:
    - .web_image
    - .release_rules
  stage: web
  before_script:
    - npm install -g pnpm@11.1.3
    - node --version
    - pnpm --version
  script:
    - pnpm --dir web/app install --frozen-lockfile
    - mkdir -p web/static-dist
    - pnpm --dir web/app build
    - test -f web/static-dist/index.html
  artifacts:
    paths:
      - web/static-dist/
    expire_in: 1 day

# Detect version changes and read build flags. Does not modify agent.toml.
docker-embed-version-check:
  extends:
    - .release_image
    - .main_rules
  stage: build
  script:
    - chmod +x .gitlab/ci-docker-embed-version-check.sh
    - ./.gitlab/ci-docker-embed-version-check.sh
  artifacts:
    reports:
      dotenv: docker-embed-build.env

# Linux csgclaw-cli for docker embed image builds (main branch only).
docker-embed-cli-build:
  extends:
    - .release_image
    - .main_rules
  stage: build
  needs:
    - job: docker-embed-version-check
      artifacts: true
  parallel:
    matrix:
      - GOOS: linux
        GOARCH: amd64
      - GOOS: linux
        GOARCH: arm64
  before_script:
    - chmod +x .gitlab/bookworm-mirror.sh scripts/release-build-all.sh
    - bash .gitlab/bookworm-mirror.sh
    - apt-get update -qq && apt-get install -y --no-install-recommends zip ca-certificates
  script:
    - |
      if [ "${DOCKER_EMBED_ANY_BUILD:-${PICOCLAW_ANY_BUILD:-false}}" != "true" ]; then
        echo "No docker embed agent.toml changes in pushed range; skipping csgclaw-cli build for embed images"
        mkdir -p "${DIST_DIR:-dist}"
        echo "skipped" > "${DIST_DIR:-dist}/docker-embed-cli-build.skipped"
        exit 0
      fi
    - export VERSION="${CI_COMMIT_SHORT_SHA}"
    - export COMMIT="$(git rev-parse --short HEAD)"
    - export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - export DIST_DIR="${DIST_DIR:-dist}"
    - export RELEASE_APPS="csgclaw-cli"
    - export DOCKER_EMBED_CLI_VERSION="${CI_COMMIT_SHORT_SHA}"
    - mkdir -p "$DIST_DIR" "${CI_PROJECT_DIR}/.gocache"
    - export GOCACHE="${GOCACHE:-${CI_PROJECT_DIR}/.gocache}"
    - export BOXLITE_CLI_VERSION="${BOXLITE_CLI_VERSION:-v0.9.0}"
    - ./scripts/release-build-all.sh "$GOOS" "$GOARCH"
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

# Must match scripts/release-platforms.txt (order need not match; set must match).
release-build:
  extends:
    - .release_image
    - .release_rules
  stage: release
  needs:
    - job: web-build
      artifacts: true
  parallel:
    matrix:
      - GOOS: linux
        GOARCH: amd64
      - GOOS: linux
        GOARCH: arm64
      - GOOS: darwin
        GOARCH: arm64
      - GOOS: darwin
        GOARCH: amd64
      - GOOS: windows
        GOARCH: amd64
  before_script:
    - chmod +x .gitlab/bookworm-mirror.sh scripts/release-build-all.sh scripts/list-docker-embed-templates.sh
    - bash .gitlab/bookworm-mirror.sh
    - apt-get update -qq && apt-get install -y --no-install-recommends zip ca-certificates
  script:
    - |
      while IFS= read -r name; do
        manifest="internal/templates/embed/${name}/agent.toml"
        test -f "${manifest}"
        grep '^ref = ' "${manifest}"
        if grep -q '^ref = ""' "${manifest}"; then
          echo "missing image ref in ${manifest}" >&2
          exit 1
        fi
      done < <(./scripts/list-docker-embed-templates.sh)
    - export VERSION="$CI_COMMIT_TAG"
    - export COMMIT="$(git rev-parse --short HEAD)"
    - export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - export DIST_DIR="${DIST_DIR:-dist}"
    - mkdir -p "$DIST_DIR" "${CI_PROJECT_DIR}/.gocache"
    - export GOCACHE="${GOCACHE:-${CI_PROJECT_DIR}/.gocache}"
    - export BOXLITE_CLI_VERSION="${BOXLITE_CLI_VERSION:-v0.9.0}"
    - ./scripts/release-build-all.sh "$GOOS" "$GOARCH"
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

docker-build-amd64:
  extends:
    - .kaniko_image
    - .kaniko_acr_auth
    - .release_rules
  stage: release
  needs:
    - job: web-build
      artifacts: true
  script:
    - export COMMIT="$(git rev-parse --short HEAD)"
    - export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --custom-platform linux/amd64 \
        --destination "${ACR_REGISTRY}/opencsghq/csgclaw:${CI_COMMIT_TAG}" \
        --build-arg GO_IMAGE="${ACR_REGISTRY}/opencsg_public/golang:1.26.2-alpine" \
        --build-arg NODE_IMAGE="${ACR_REGISTRY}/opencsghq/node:22.13.0-alpine" \
        --build-arg RUNTIME_IMAGE="${ACR_REGISTRY}/opencsg_public/alpine:3.23" \
        --build-arg GOPROXY="${GOPROXY}" \
        --build-arg VERSION="${CI_COMMIT_TAG}" \
        --build-arg COMMIT="${COMMIT}" \
        --build-arg BUILD_TIME="${BUILD_TIME}"

picoclaw-manager-image:
  extends: .docker_embed_image_build
  variables:
    DOCKER_EMBED_DOCKERFILE: internal/templates/embed/picoclaw-manager/Dockerfile
    DOCKER_EMBED_IMAGE_NAME: picoclaw-manager

picoclaw-worker-image:
  extends: .docker_embed_image_build
  variables:
    DOCKER_EMBED_DOCKERFILE: internal/templates/embed/picoclaw-worker/Dockerfile
    DOCKER_EMBED_IMAGE_NAME: picoclaw-worker

openclaw-manager-image:
  extends: .docker_embed_image_build
  variables:
    DOCKER_EMBED_DOCKERFILE: internal/templates/embed/openclaw-manager/Dockerfile
    DOCKER_EMBED_IMAGE_NAME: openclaw-manager

openclaw-worker-image:
  extends: .docker_embed_image_build
  variables:
    DOCKER_EMBED_DOCKERFILE: internal/templates/embed/openclaw-worker/Dockerfile
    DOCKER_EMBED_IMAGE_NAME: openclaw-worker

.docker_embed_manifest:
  extends:
    - .crane_image
    - .main_rules
  stage: image
  needs:
    - job: docker-embed-version-check
      artifacts: true
  before_script:
    - chmod +x .gitlab/ci-docker-embed-manifest.sh
    - crane version
  script:
    - |
      case "${DOCKER_EMBED_IMAGE_NAME}" in
        picoclaw-manager) build_flag="${PICOCLAW_MANAGER_BUILD:-false}" ;;
        picoclaw-worker) build_flag="${PICOCLAW_WORKER_BUILD:-false}" ;;
        openclaw-manager) build_flag="${OPENCLAW_MANAGER_BUILD:-false}" ;;
        openclaw-worker) build_flag="${OPENCLAW_WORKER_BUILD:-false}" ;;
        *)
          echo "unknown docker embed image ${DOCKER_EMBED_IMAGE_NAME}" >&2
          exit 1
          ;;
      esac
      if [ "${build_flag}" != "true" ]; then
        echo "docker embed version unchanged; skipping ${DOCKER_EMBED_IMAGE_NAME} manifest"
        exit 0
      fi
    - sh .gitlab/ci-docker-embed-manifest.sh "${DOCKER_EMBED_IMAGE_NAME}"

picoclaw-manager-manifest:
  extends: .docker_embed_manifest
  needs:
    - job: docker-embed-version-check
      artifacts: true
    - job: picoclaw-manager-image
      artifacts: false
  variables:
    DOCKER_EMBED_IMAGE_NAME: picoclaw-manager

picoclaw-worker-manifest:
  extends: .docker_embed_manifest
  needs:
    - job: docker-embed-version-check
      artifacts: true
    - job: picoclaw-worker-image
      artifacts: false
  variables:
    DOCKER_EMBED_IMAGE_NAME: picoclaw-worker

openclaw-manager-manifest:
  extends: .docker_embed_manifest
  needs:
    - job: docker-embed-version-check
      artifacts: true
    - job: openclaw-manager-image
      artifacts: false
  variables:
    DOCKER_EMBED_IMAGE_NAME: openclaw-manager

openclaw-worker-manifest:
  extends: .docker_embed_manifest
  needs:
    - job: docker-embed-version-check
      artifacts: true
    - job: openclaw-worker-image
      artifacts: false
  variables:
    DOCKER_EMBED_IMAGE_NAME: openclaw-worker

release-upload:
  extends:
    - .release_image
    - .release_rules
  stage: upload
  needs:
    - job: release-build
      artifacts: true
    - job: docker-build-amd64
      artifacts: false
  before_script:
    - chmod +x .gitlab/bookworm-mirror.sh
    - bash .gitlab/bookworm-mirror.sh
    - apt-get update -qq && apt-get install -y --no-install-recommends openssh-client python3 ca-certificates
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - |
      if [ -z "${REMOTE_SSH}" ]; then
        echo "REMOTE_SSH must be set in CI/CD variables" >&2
        exit 1
      fi
    - |
      if [ -n "${SSH_PRIVATE_KEY}" ]; then
        if [ -f "${SSH_PRIVATE_KEY}" ]; then
          cp "${SSH_PRIVATE_KEY}" ~/.ssh/id_rsa
        else
          printf '%s\n' "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
        fi
        chmod 600 ~/.ssh/id_rsa
        export SSH_IDENTITY_FILE="${HOME}/.ssh/id_rsa"
      fi
    - |
      if [ -n "${SSH_KNOWN_HOSTS}" ]; then
        printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts
      else
        KEYSCAN_HOST="${REMOTE_SSH##*@}"
        if ! ssh-keyscan -p "${SSH_PORT:-22}" "${KEYSCAN_HOST}" >> ~/.ssh/known_hosts 2>/dev/null; then
          echo "ssh-keyscan failed; set SSH_KNOWN_HOSTS in CI variables" >&2
          exit 1
        fi
      fi
  script:
    - bash .gitlab/ci-gitlab-release-upload.sh
