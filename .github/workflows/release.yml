name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
      package_mode:
        description: "Packaging mode for the csgclaw release artifact"
        required: false
        default: "bundled-boxlite-cli"
        type: choice
        options:
          - bundled-boxlite-cli
          - legacy-single-binary

permissions:
  contents: write

env:
  BOXLITE_CLI_VERSION: v0.8.2

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          # Temporarily disable linux/arm64 release builds.
          # - runner: ubuntu-24.04-arm
          #   goos: linux
          #   goarch: arm64
          - runner: macos-14
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve package mode
        id: package_mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.package_mode }}" ]; then
            package_mode="${{ github.event.inputs.package_mode }}"
          else
            package_mode="bundled-boxlite-cli"
          fi
          echo "value=${package_mode}" >> "$GITHUB_OUTPUT"

      - name: Resolve build metadata
        id: build_meta
        shell: bash
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Package release archive
        shell: bash
        run: |
          chmod +x scripts/package-release.sh
          VERSION="${{ steps.version.outputs.value }}" \
          COMMIT="${{ steps.build_meta.outputs.commit }}" \
          BUILD_TIME="${{ steps.build_meta.outputs.build_time }}" \
          DIST_DIR=dist \
          APP=csgclaw \
          GOCACHE="${{ github.workspace }}/.gocache" \
          PACKAGE_MODE="${{ steps.package_mode.outputs.value }}" \
          BOXLITE_CLI_VERSION="${{ env.BOXLITE_CLI_VERSION }}" \
          CGO_ENABLED=1 \
          ./scripts/package-release.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"
          VERSION="${{ steps.version.outputs.value }}" \
          COMMIT="${{ steps.build_meta.outputs.commit }}" \
          BUILD_TIME="${{ steps.build_meta.outputs.build_time }}" \
          DIST_DIR=dist \
          APP=csgclaw-cli \
          GOCACHE="${{ github.workspace }}/.gocache" \
          CGO_ENABLED=1 \
          ./scripts/package-release.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: dist/*
