# Release on tag v* / workflow_dispatch.
#
# Container images for embed templates (those with a Dockerfile) are built on GitLab CI (ACR).
# This workflow only:
#   1. Stages embed/<template>/dist/ for every template dir that contains a Dockerfile
#   2. Patches dist/agent.toml [image].ref to ${ACR_REGISTRY}/opencsghq/<template>:<version>
#   3. Builds csgclaw / csgclaw-cli release archives with the patched embed
#
# <version> is the git tag (v*) or workflow_dispatch input.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true

permissions:
  contents: write

env:
  BOXLITE_CLI_VERSION: v0.9.0
  ACR_REGISTRY: opencsg-registry.cn-beijing.cr.aliyuncs.com

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix from release-platforms.txt
        id: set-matrix
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          rows = []
          for line in Path("scripts/release-platforms.txt").read_text().splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              parts = line.split()
              if len(parts) != 2:
                  raise SystemExit(f"bad platform line: {line!r}")
              goos, goarch = parts
              rows.append({"goos": goos, "goarch": goarch})
          print("matrix=" + json.dumps({"include": rows}))
          PY

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: web/app/package.json

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm_store
        shell: bash
        working-directory: web/app
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Web UI dependencies
        shell: bash
        working-directory: web/app
        run: pnpm install --frozen-lockfile

      - name: Build Web UI
        shell: bash
        working-directory: web/app
        run: |
          mkdir -p ../static-dist
          pnpm build
          test -f ../static-dist/index.html

      - name: Upload Web UI static assets
        uses: actions/upload-artifact@v4
        with:
          name: web-static-dist
          path: web/static-dist/
          if-no-files-found: error

  docker-embed-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Stage docker embed dist and patch ACR image refs
        shell: bash
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          chmod +x scripts/list-docker-embed-templates.sh \
            scripts/prepare-docker-embed-dist.sh \
            scripts/patch-docker-embed-image-refs.sh
          ./scripts/prepare-docker-embed-dist.sh
          ./scripts/patch-docker-embed-image-refs.sh
          while IFS= read -r name; do
            echo "${name} ref:"
            grep '^ref = ' "internal/templates/embed/${name}/dist/agent.toml"
          done < <(./scripts/list-docker-embed-templates.sh)

      - name: Upload patched docker embed directories
        uses: actions/upload-artifact@v4
        with:
          name: docker-embed-dist-patched
          path: internal/templates/embed/*/dist/
          if-no-files-found: error

  build:
    needs: [prepare, web, docker-embed-dist]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Web UI embed directory
        shell: bash
        run: |
          rm -rf web/static-dist
          mkdir -p web/static-dist

      - name: Download Web UI static assets
        uses: actions/download-artifact@v4
        with:
          name: web-static-dist
          path: web/static-dist

      - name: Download patched docker embed directories
        uses: actions/download-artifact@v4
        with:
          name: docker-embed-dist-patched
          # Artifact root is internal/templates/embed/ (LCA of embed/*/dist paths).
          path: internal/templates/embed

      - name: Verify docker embed dist is present
        shell: bash
        run: |
          chmod +x scripts/list-docker-embed-templates.sh
          while IFS= read -r name; do
            test -f "internal/templates/embed/${name}/dist/agent.toml"
            grep '^ref = ' "internal/templates/embed/${name}/dist/agent.toml"
          done < <(./scripts/list-docker-embed-templates.sh)

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve build metadata
        id: build_meta
        shell: bash
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Package release archives (one platform)
        shell: bash
        run: |
          chmod +x scripts/release-build-all.sh
          VERSION="${{ steps.version.outputs.value }}" \
          COMMIT="${{ steps.build_meta.outputs.commit }}" \
          BUILD_TIME="${{ steps.build_meta.outputs.build_time }}" \
          DIST_DIR=dist \
          GOCACHE="${{ github.workspace }}/.gocache" \
          BOXLITE_CLI_VERSION="${{ env.BOXLITE_CLI_VERSION }}" \
          ./scripts/release-build-all.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  merge-and-release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: dist/*
