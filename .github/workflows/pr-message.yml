name: pr-message

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr-message:
    name: validate-pr-message
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read

    steps:
      - name: Validate PR title and body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            const title = pr.title || "";
            const body = (pr.body || "")
              .replace(/\r\n/g, "\n")
              .trim();

            const titleRe =
              /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._-]+\))?!?: .+$/;

            if (!titleRe.test(title)) {
              core.setFailed(
                [
                  "Invalid PR title.",
                  "",
                  "Expected Conventional Commit format:",
                  "  feat(scope): summary",
                  "  fix(scope): summary",
                  "  docs: summary",
                  "",
                  `Actual: ${title}`,
                ].join("\n")
              );
              return;
            }

            if (/^Co-authored-by:\s+/im.test(body)) {
              core.setFailed(
                'Invalid PR body: must not contain "Co-authored-by:" trailers.'
              );
              return;
            }

            if (body.length > 0) {
              const invalidLines = body
                .split("\n")
                .map((line, index) => ({ line, number: index + 1 }))
                .filter(({ line }) => !/^- .+/.test(line));

              if (invalidLines.length > 0) {
                core.setFailed(
                  [
                    "Invalid PR body.",
                    "",
                    'If PR body is present, every line must start with "- ".',
                    "Blank lines are not allowed.",
                    "",
                    "Invalid lines:",
                    ...invalidLines.map(
                      ({ number, line }) => `  line ${number}: ${line || "<blank line>"}`
                    ),
                  ].join("\n")
                );
                return;
              }
            }

            core.info("PR title and body look good.");
